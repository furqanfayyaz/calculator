<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculator in talwind</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">
      <div class="bg-white p-6 rounded-2xl shadow-lg w-80">
    <div class="bg-gray-200 text-right p-4 rounded-xl text-3xl font-bold mb-4">
      0
    </div>
         <div class="grid grid-cols-4 gap-2">

      <button class="col-span-2 bg-red-500 text-white p-3 rounded-lg hover:bg-red-600 font-bold">AC</button>
      <button class="bg-gray-300 text-black p-3 rounded-lg hover:bg-gray-400 font-bold">DEL</button>
              
      <button class="bg-blue-500 text-white p-3 rounded-lg hover:bg-blue-600 font-bold">÷</button>
          
      <button class="bg-gray-200 text-black p-3 rounded-lg hover:bg-gray-300 font-bold">7</button>
      <button class="bg-gray-200 text-black p-3 rounded-lg hover:bg-gray-300 font-bold">8</button>
      <button class="bg-gray-200 text-black p-3 rounded-lg hover:bg-gray-300 font-bold">9</button>
      <button class="bg-blue-500 text-white p-3 rounded-lg hover:bg-blue-600 font-bold">×</button>

      <button class="bg-gray-200 text-black p-3 rounded-lg hover:bg-gray-300 font-bold">4</button>
      <button class="bg-gray-200 text-black p-3 rounded-lg hover:bg-gray-300 font-bold">5</button>
      <button class="bg-gray-200 text-black p-3 rounded-lg hover:bg-gray-300 font-bold">6</button>
      <button class="bg-blue-500 text-white p-3 rounded-lg hover:bg-blue-600 font-bold">-</button>

      <button class="bg-gray-200 text-black p-3 rounded-lg hover:bg-gray-300 font-bold">1</button>
      <button class="bg-gray-200 text-black p-3 rounded-lg hover:bg-gray-300 font-bold">2</button>
      <button class="bg-gray-200 text-black p-3 rounded-lg hover:bg-gray-300 font-bold">3</button>
      <button class="bg-blue-500 text-white p-3 rounded-lg hover:bg-blue-600 font-bold">+</button>

      <button class="bg-gray-200 text-black p-3 rounded-lg hover:bg-gray-300 font-bold">0</button>
      <button class="bg-gray-200 text-black p-3 rounded-lg hover:bg-gray-300 font-bold">.</button>

      <button class="col-span-2 bg-green-500 text-white p-3 rounded-lg hover:bg-green-600 font-bold">=</button>
      </div>
      </div>
</body>
</html>
